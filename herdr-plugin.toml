id = "sessionizer"
name = "Sessionizer"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "Focus an existing Herdr workspace or create a new project workspace from your Sessionizer layout config."
platforms = ["macos", "linux"]

[[build]]
command = ["bun", "install", "--frozen-lockfile"]

[[actions]]
id = "open"
title = "Open sessionizer"
command = ["bun", "run", "src/open-pane.ts"]

[[actions]]
id = "worktree-open"
title = "Open worktree"
command = ["bun", "run", "src/open-worktree-pane.ts"]

[[panes]]
id = "sessionizer"
title = "Sessionizer"
placement = "overlay"
command = ["bun", "run", "src/sessionizer-pane.ts"]

[[panes]]
id = "worktree"
title = "Worktree"
placement = "overlay"
command = ["bun", "run", "src/worktree-pane.ts"]
