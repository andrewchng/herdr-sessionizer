id = "sessionizer"
name = "Sessionizer"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "Focus an existing Herdr workspace or create a new project workspace with the standard terminal, editor, and server tabs."
platforms = ["macos", "linux"]

[[build]]
command = ["bun", "install", "--frozen-lockfile"]

[[actions]]
id = "open"
title = "Open sessionizer"
command = ["bun", "run", "src/open-pane.ts"]

[[actions]]
id = "fzf-smoke"
title = "Run hello smoke test"
command = ["bun", "run", "src/fzf-smoke.ts"]

[[panes]]
id = "sessionizer"
title = "Sessionizer"
placement = "overlay"
command = ["bun", "run", "src/sessionizer-pane.ts"]
